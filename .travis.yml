language: java
arch:
  - arm64
os:
  - linux
services:
  - docker
branches:
  only:
    - master
before_install:
  - docker login -u "$DOCKER_USERNAME" -p $DOCKER_PASSWORD
script: 
  - cd rocketmq-console 
  - sudo apt-get -y install maven
  - mvn clean package -Dmaven.test.skip=true
  - cp src/main/docker/Dockerfile target/
  - cd target
  - docker build -t toyangdon/rocketmq-console:4.5.0 .
